<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="NLN · No Loading News — Noticias de videojuegos indie y gaming en español">
<title>NLN · No Loading News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Barlow:wght@300;400;500&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#222;--border:#2a2a2a;--text:#f0f0f0;--muted:#888;--accent:#e8000d;--gold:#f5a623;--white:#ffffff}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-weight:300;line-height:1.5}
a{text-decoration:none;color:inherit}
.topbar{background:var(--accent);padding:0 1.5rem;display:flex;align-items:center;height:32px;gap:1rem;overflow:hidden}
.topbar-label{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:#fff;white-space:nowrap;padding-right:1rem;border-right:1px solid rgba(255,255,255,.3)}
.ticker-wrap{flex:1;overflow:hidden;mask-image:linear-gradient(to right,transparent,black 3%,black 97%,transparent)}
.ticker{display:flex;gap:3rem;white-space:nowrap;animation:ticker 50s linear infinite}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ticker-item{font-family:'Barlow',sans-serif;font-size:.72rem;font-weight:500;color:rgba(255,255,255,.9)}
.ticker-sep{color:rgba(255,255,255,.4);margin:0 .5rem}
header{background:#000;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header-inner{max-width:1280px;margin:0 auto;padding:0 1.5rem;display:flex;align-items:center;height:56px;gap:2rem}
.logo{display:flex;align-items:center;gap:.8rem;flex-shrink:0}
.logo-nln{font-family:'Oswald',sans-serif;font-weight:700;font-size:2rem;color:var(--accent);letter-spacing:-.02em;line-height:1}
.logo-text{border-left:2px solid var(--border);padding-left:.8rem;line-height:1.2}
.logo-text strong{display:block;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;color:var(--white)}
.logo-text span{display:block;font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.search-wrap{flex:1;max-width:360px;position:relative}
.search-wrap svg{position:absolute;left:.7rem;top:50%;transform:translateY(-50%);color:var(--muted);width:14px;height:14px}
#search{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:.45rem .8rem .45rem 2.2rem;color:var(--text);font-family:'Barlow',sans-serif;font-size:.82rem;outline:none;transition:border-color .2s}
#search::placeholder{color:var(--muted)}
#search:focus{border-color:var(--accent)}
.header-right{margin-left:auto;display:flex;align-items:center;gap:1rem}
.x-link{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.4rem .9rem;border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.78rem;letter-spacing:.05em;text-transform:uppercase;transition:all .15s;white-space:nowrap}
.x-link:hover{background:var(--accent);border-color:var(--accent);color:#fff}
nav{background:var(--surface);border-bottom:1px solid var(--border)}
.nav-inner{max-width:1280px;margin:0 auto;padding:0 1.5rem;display:flex;align-items:center;overflow-x:auto;scrollbar-width:none}
.nav-inner::-webkit-scrollbar{display:none}
.nav-btn{background:none;border:none;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;padding:.75rem 1.1rem;cursor:pointer;white-space:nowrap;transition:color .15s;position:relative}
.nav-btn::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent);transform:scaleX(0);transition:transform .15s}
.nav-btn:hover{color:var(--white)}
.nav-btn.active{color:var(--white)}
.nav-btn.active::after{transform:scaleX(1)}
main{max-width:1280px;margin:0 auto;padding:1.5rem}
.hero-section{display:grid;grid-template-columns:1fr 340px;gap:1.5px;background:var(--border);margin-bottom:2rem}
@media(max-width:900px){.hero-section{grid-template-columns:1fr}.hero-sidebar{display:none}}
.hero-main{position:relative;overflow:hidden;cursor:pointer;background:#111}
.hero-main img{width:100%;height:420px;object-fit:cover;display:block;transition:transform .5s ease;filter:brightness(.85)}
.hero-main:hover img{transform:scale(1.03);filter:brightness(.95)}
.hero-main-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.95) 0%,rgba(0,0,0,.6) 40%,rgba(0,0,0,.1) 70%,transparent 100%);display:flex;flex-direction:column;justify-content:flex-end;padding:1.5rem}
.hero-tag{display:inline-flex;align-items:center;background:var(--accent);color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;padding:.25rem .6rem;margin-bottom:.6rem;width:fit-content}
.hero-titulo{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:2.2rem;line-height:1.1;color:#fff;letter-spacing:-.01em;margin-bottom:.5rem;text-shadow:0 2px 8px rgba(0,0,0,.5)}
.hero-resumen{font-size:.85rem;color:rgba(255,255,255,.75);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:.8rem}
.hero-meta{display:flex;align-items:center;gap:1rem;font-size:.72rem;color:rgba(255,255,255,.5)}
.hero-sidebar{display:flex;flex-direction:column;gap:1.5px;background:var(--border)}
.hero-side-item{flex:1;position:relative;overflow:hidden;cursor:pointer;background:#111}
.hero-side-item img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s ease;filter:brightness(.7);min-height:100px}
.hero-side-item:hover img{transform:scale(1.05);filter:brightness(.9)}
.hero-side-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.9) 0%,transparent 60%);display:flex;flex-direction:column;justify-content:flex-end;padding:.8rem}
.side-tag{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:.3rem}
.side-titulo{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.95rem;line-height:1.2;color:#fff}
.stats-banner{background:var(--surface);border:1px solid var(--border);padding:1rem;display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;text-align:center;margin-bottom:2rem}
.stat-item{border-right:1px solid var(--border)}
.stat-item:last-child{border-right:none}
.stat-val{font-family:'Oswald',sans-serif;font-size:1.5rem;font-weight:700;color:var(--accent);line-height:1}
.stat-label{font-family:'Barlow Condensed',sans-serif;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:.2rem}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:.6rem;border-bottom:2px solid var(--accent)}
.section-title{font-family:'Oswald',sans-serif;font-weight:600;font-size:1.1rem;letter-spacing:.05em;text-transform:uppercase;color:var(--white)}
.section-count{font-family:'Barlow Condensed',sans-serif;font-size:.75rem;color:var(--muted);letter-spacing:.05em}
.content-layout{display:grid;grid-template-columns:1fr 300px;gap:2rem}
@media(max-width:960px){.content-layout{grid-template-columns:1fr}.sidebar{display:none}}
#grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5px;background:var(--border)}
@media(max-width:700px){#grid{grid-template-columns:1fr}}
.card{background:var(--surface);cursor:pointer;display:flex;flex-direction:column;transition:background .15s;animation:fadeIn .3s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card:hover{background:var(--surface2)}
.card-img-wrap{position:relative;overflow:hidden}
.card-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;transition:transform .4s ease;background:var(--border)}
.card:hover .card-img{transform:scale(1.05)}
.card-viral{position:absolute;top:.5rem;left:.5rem;background:var(--accent);color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;padding:.2rem .5rem}
.card-body{padding:.9rem;display:flex;flex-direction:column;gap:.4rem;flex:1}
.card-tag{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--accent)}
.card-tag.lanzamiento{color:#4caf50}
.card-tag.polemica{color:var(--gold)}
.card-tag.muerte{color:#aaa}
.card-titulo{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;line-height:1.25;letter-spacing:.01em;color:var(--white);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-resumen{font-size:.78rem;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex:1}
.card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:.6rem;border-top:1px solid var(--border);margin-top:.3rem}
.card-date{font-size:.68rem;color:var(--muted);font-family:'Barlow Condensed',sans-serif;letter-spacing:.05em}
.card-stats{display:flex;gap:.6rem;font-size:.68rem;color:var(--muted)}
.card-x-link{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.68rem;letter-spacing:.05em;color:var(--accent);text-transform:uppercase}
.card-x-link:hover{color:var(--gold)}
.sidebar-section{margin-bottom:2rem}
.sidebar-title{font-family:'Oswald',sans-serif;font-weight:600;font-size:.85rem;letter-spacing:.1em;text-transform:uppercase;color:var(--white);padding-bottom:.5rem;border-bottom:2px solid var(--accent);margin-bottom:.8rem}
.sidebar-item{display:flex;gap:.7rem;padding:.6rem 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .15s}
.sidebar-item:hover{opacity:.8}
.sidebar-item:last-child{border-bottom:none}
.sidebar-img{width:72px;height:48px;object-fit:cover;flex-shrink:0;background:var(--border)}
.sidebar-info{flex:1}
.sidebar-tag{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:.2rem}
.sidebar-titulo{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.82rem;line-height:1.2;color:var(--white);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sidebar-date{font-size:.62rem;color:var(--muted);margin-top:.2rem}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:1.5rem;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);max-width:720px;width:100%;max-height:90vh;overflow-y:auto;border:1px solid var(--border);transform:translateY(16px);transition:transform .2s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block}
.modal-body{padding:1.5rem}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:.8rem}
.modal-titulo{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.8rem;line-height:1.1;letter-spacing:-.01em;color:var(--white);flex:1}
.modal-close{background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:.4rem .8rem;font-family:'Barlow Condensed',sans-serif;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;flex-shrink:0;transition:all .15s}
.modal-close:hover{border-color:var(--accent);color:var(--accent)}
.modal-resumen{font-size:.9rem;color:rgba(255,255,255,.7);line-height:1.7;margin-bottom:1.2rem;border-left:3px solid var(--accent);padding-left:1rem}
.modal-stats{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1.2rem;padding:.8rem;background:var(--surface2);border:1px solid var(--border)}
.modal-stat{text-align:center;flex:1;min-width:60px}
.modal-stat-val{font-family:'Oswald',sans-serif;font-size:1.4rem;font-weight:700;color:var(--accent)}
.modal-stat-label{font-family:'Barlow Condensed',sans-serif;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.modal-actions{display:flex;gap:.7rem;flex-wrap:wrap}
.btn-primary{background:var(--accent);color:#fff;padding:.6rem 1.2rem;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;border:none;cursor:pointer;transition:opacity .15s;text-decoration:none;display:inline-block}
.btn-primary:hover{opacity:.85}
.btn-secondary{background:none;border:1px solid var(--border);color:var(--text);padding:.6rem 1.2rem;font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:border-color .15s}
.btn-secondary:hover{border-color:var(--white)}
.empty{text-align:center;padding:5rem 2rem;color:var(--muted);grid-column:1/-1}
.loading{display:flex;align-items:center;justify-content:center;min-height:300px;gap:1rem;color:var(--muted);grid-column:1/-1;flex-direction:column}
.spinner{width:30px;height:30px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
footer{background:#000;border-top:2px solid var(--accent);padding:2rem 1.5rem;margin-top:3rem}
.footer-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem}
.footer-logo{font-family:'Oswald',sans-serif;font-weight:700;font-size:1.8rem;color:var(--accent);letter-spacing:-.02em}
.footer-info{font-size:.75rem;color:var(--muted);font-family:'Barlow Condensed',sans-serif;letter-spacing:.05em;text-align:right;line-height:1.8}
.footer-info a{color:var(--accent)}
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-label">🔴 En vivo</span>
  <div class="ticker-wrap"><div class="ticker" id="ticker"></div></div>
</div>

<header>
  <div class="header-inner">
    <a href="/" class="logo">
      <span class="logo-nln">NLN</span>
      <div class="logo-text">
        <strong>No Loading News</strong>
        <span>Noticias Gaming al Instante</span>
      </div>
    </a>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search" placeholder="Buscar noticias..." autocomplete="off">
    </div>
    <div class="header-right">
      <a href="https://twitter.com/elmarioverde89" target="_blank" class="x-link">𝕏 @elmarioverde89</a>
    </div>
  </div>
</header>

<nav>
  <div class="nav-inner">
    <button class="nav-btn active" data-tipo="todos">Todas</button>
    <button class="nav-btn" data-tipo="viral">🔥 Virales</button>
    <button class="nav-btn" data-tipo="lanzamiento">Lanzamientos</button>
    <button class="nav-btn" data-tipo="polemica">Polémicas</button>
    <button class="nav-btn" data-tipo="muerte">In Memoriam</button>
    <button class="nav-btn" data-tipo="general">General</button>
  </div>
</nav>

<main>
  <section id="hero-section" style="display:none;margin-bottom:2rem">
    <div class="hero-section" id="hero-grid"></div>
  </section>

  <div class="stats-banner" id="stats-banner" style="display:none">
    <div class="stat-item"><div class="stat-val" id="stat-total">0</div><div class="stat-label">Noticias</div></div>
    <div class="stat-item"><div class="stat-val" id="stat-hoy">0</div><div class="stat-label">Hoy</div></div>
    <div class="stat-item"><div class="stat-val" id="stat-actualizado">—</div><div class="stat-label">Última actualización</div></div>
  </div>

  <div class="section-header">
    <h2 class="section-title" id="section-title">Últimas Noticias</h2>
    <span class="section-count" id="count"></span>
  </div>

  <div class="content-layout">
    <div id="grid"><div class="loading"><div class="spinner"></div><span>Cargando noticias...</span></div></div>
    <aside class="sidebar" id="sidebar" style="display:none">
      <div class="sidebar-section">
        <div class="sidebar-title">Más Virales</div>
        <div id="sidebar-list"></div>
      </div>
    </aside>
  </div>
</main>

<div class="modal-overlay" id="modal-overlay" onclick="cerrarModal(event)">
  <div class="modal" id="modal"></div>
</div>

<footer>
  <div class="footer-inner">
    <div class="footer-logo">NLN</div>
    <div class="footer-info">
      Noticias de videojuegos indie y gaming en español<br>
      <a href="https://twitter.com/elmarioverde89" target="_blank">𝕏 @elmarioverde89</a>
      &nbsp;·&nbsp;<span id="footer-updated"></span>
    </div>
  </div>
</footer>

<script>
const JSON_URL='https://gamerbotnews.blob.core.windows.net/datos-excel/noticias.json';
let todasNoticias=[],filtroActual='todos',busqueda='';

async function cargarNoticias(){
  try{
    const res=await fetch(JSON_URL+'?t='+Date.now());
    const data=await res.json();
    todasNoticias=data.noticias||[];
    const hoy=new Date().toISOString().slice(0,10).replace(/-/g,'');
    const hoyCount=todasNoticias.filter(n=>(n.publicado_en||n.fecha_raw||'').slice(0,8)===hoy).length;
    document.getElementById('stat-total').textContent=data.total||todasNoticias.length;
    document.getElementById('stat-hoy').textContent=hoyCount;
    document.getElementById('stat-actualizado').textContent=formatHora(data.actualizado);
    document.getElementById('stats-banner').style.display='grid';
    document.getElementById('footer-updated').textContent='Actualizado '+formatFecha(data.actualizado);
    iniciarTicker();renderSidebar();renderizar();
  }catch(e){
    document.getElementById('grid').innerHTML='<div class="empty"><p style="font-size:2rem;margin-bottom:1rem">📡</p><p>No se pudieron cargar las noticias.</p></div>';
  }
}

function iniciarTicker(){
  const items=todasNoticias.slice(0,12);
  if(!items.length)return;
  const html=items.map(n=>`<span class="ticker-item">${n.titulo} <span class="ticker-sep">◆</span></span>`).join('');
  document.getElementById('ticker').innerHTML=html+html;
}

function renderSidebar(){
  const virales=[...todasNoticias].filter(n=>n.score>0).sort((a,b)=>b.score-a.score).slice(0,8);
  if(!virales.length)return;
  document.getElementById('sidebar').style.display='block';
  document.getElementById('sidebar-list').innerHTML=virales.map(n=>`
    <div class="sidebar-item" onclick="abrirModal('${n.id}')">
      <img class="sidebar-img" src="${n.imagen}" alt="${n.titulo}" onerror="this.style.background='var(--border)'">
      <div class="sidebar-info">
        <div class="sidebar-tag">${tipoLabel(n.tipo)}</div>
        <div class="sidebar-titulo">${n.titulo}</div>
        <div class="sidebar-date">${n.fecha}</div>
      </div>
    </div>`).join('');
}

function filtrar(){
  let lista=[...todasNoticias];
  if(filtroActual==='viral') lista=lista.filter(n=>n.score>0).sort((a,b)=>b.score-a.score);
  else if(filtroActual!=='todos') lista=lista.filter(n=>n.tipo===filtroActual);
  if(busqueda.trim()){const q=busqueda.toLowerCase();lista=lista.filter(n=>n.titulo.toLowerCase().includes(q)||(n.resumen||'').toLowerCase().includes(q));}
  return lista;
}

function renderizar(){
  const lista=filtrar();
  document.getElementById('count').textContent=`${lista.length} ${lista.length===1?'noticia':'noticias'}`;
  const heroSection=document.getElementById('hero-section');
  const heroGrid=document.getElementById('hero-grid');
  if(lista.length>=3&&filtroActual==='todos'&&!busqueda){
    const[h1,h2,h3]=lista;
    heroSection.style.display='block';
    heroGrid.innerHTML=`
      <div class="hero-main" onclick="abrirModal('${h1.id}')">
        <img src="${h1.imagen}" alt="${h1.titulo}" onerror="this.style.display='none'">
        <div class="hero-main-overlay">
          <div class="hero-tag">${tipoLabel(h1.tipo)}</div>
          <h1 class="hero-titulo">${h1.titulo}</h1>
          <p class="hero-resumen">${h1.resumen||''}</p>
          <div class="hero-meta">
            <span>${h1.fecha}</span>
            ${h1.likes>0?`<span>|</span><span>❤️ ${h1.likes}</span>`:''}
            ${h1.rts>0?`<span>|</span><span>🔁 ${h1.rts}</span>`:''}
          </div>
        </div>
      </div>
      <div class="hero-sidebar">
        ${[h2,h3].map(n=>`
        <div class="hero-side-item" onclick="abrirModal('${n.id}')">
          <img src="${n.imagen}" alt="${n.titulo}" onerror="this.style.background='#111'">
          <div class="hero-side-overlay">
            <div class="side-tag">${tipoLabel(n.tipo)}</div>
            <div class="side-titulo">${n.titulo}</div>
          </div>
        </div>`).join('')}
      </div>`;
  }else{heroSection.style.display='none';}
  const offset=(heroSection.style.display!=='none')?3:0;
  const resto=lista.slice(offset);
  if(resto.length===0){document.getElementById('grid').innerHTML='<div class="empty"><p>🎮</p><p style="margin-top:1rem">No hay noticias en esta categoría.</p></div>';return;}
  document.getElementById('grid').innerHTML=resto.map((n,idx)=>`
    <article class="card" style="animation-delay:${Math.min(idx*.03,.4)}s" onclick="abrirModal('${n.id}')">
      <div class="card-img-wrap">
        <img class="card-img" src="${n.imagen}" alt="${n.titulo}" onerror="this.style.minHeight='120px'">
        ${n.score>50?'<div class="card-viral">🔥 Viral</div>':''}
      </div>
      <div class="card-body">
        <div class="card-tag ${n.tipo}">${tipoLabel(n.tipo)}</div>
        <h2 class="card-titulo">${n.titulo}</h2>
        <p class="card-resumen">${n.resumen||''}</p>
        <div class="card-footer">
          <span class="card-date">${n.fecha}</span>
          <div class="card-stats">
            ${n.likes>0?`<span>❤️ ${n.likes}</span>`:''}
            ${n.rts>0?`<span>🔁 ${n.rts}</span>`:''}
          </div>
          ${n.tweet_url?`<a href="${n.tweet_url}" target="_blank" class="card-x-link" onclick="event.stopPropagation()">Ver 𝕏</a>`:''}
        </div>
      </div>
    </article>`).join('');
}

function abrirModal(id){
  const n=todasNoticias.find(x=>x.id===id);
  if(!n)return;
  const tieneStats=n.likes>0||n.rts>0||n.impresiones>0;
  document.getElementById('modal').innerHTML=`
    <img class="modal-img" src="${n.imagen}" alt="${n.titulo}" onerror="this.style.display='none'">
    <div class="modal-body">
      <div class="modal-header">
        <h2 class="modal-titulo">${n.titulo}</h2>
        <button class="modal-close" onclick="cerrarModal()">✕ Cerrar</button>
      </div>
      <div class="card-tag ${n.tipo}" style="margin-bottom:.8rem">${tipoLabel(n.tipo)} · ${n.fecha}</div>
      ${tieneStats?`<div class="modal-stats">
        ${n.likes>0?`<div class="modal-stat"><div class="modal-stat-val">${n.likes}</div><div class="modal-stat-label">Likes</div></div>`:''}
        ${n.rts>0?`<div class="modal-stat"><div class="modal-stat-val">${n.rts}</div><div class="modal-stat-label">Retweets</div></div>`:''}
        ${n.impresiones>0?`<div class="modal-stat"><div class="modal-stat-val">${fmtNum(n.impresiones)}</div><div class="modal-stat-label">Impresiones</div></div>`:''}
        ${n.score>0?`<div class="modal-stat"><div class="modal-stat-val">${Math.round(n.score)}</div><div class="modal-stat-label">Score</div></div>`:''}
      </div>`:''}
      <p class="modal-resumen">${n.resumen||''}</p>
      <div class="modal-actions">
        ${n.url_fuente?`<a href="${n.url_fuente}" target="_blank" class="btn-primary">Leer noticia</a>`:''}
        ${n.tweet_url?`<a href="${n.tweet_url}" target="_blank" class="btn-primary">Ver en 𝕏</a>`:''}
        <button class="btn-secondary" onclick="cerrarModal()">Cerrar</button>
      </div>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function cerrarModal(e){
  if(!e||e.target===document.getElementById('modal-overlay')){
    document.getElementById('modal-overlay').classList.remove('open');
    document.body.style.overflow='';
  }
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')cerrarModal();});

document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    filtroActual=btn.dataset.tipo;
    document.getElementById('section-title').textContent=
      filtroActual==='todos'?'Últimas Noticias':
      filtroActual==='viral'?'🔥 Más Virales':
      filtroActual==='lanzamiento'?'Lanzamientos':
      filtroActual==='polemica'?'Polémicas':
      filtroActual==='muerte'?'In Memoriam':'General';
    renderizar();
  });
});

document.getElementById('search').addEventListener('input',e=>{busqueda=e.target.value;renderizar();});

function tipoLabel(tipo){return{lanzamiento:'Lanzamiento',polemica:'Polémica',muerte:'In Memoriam',general:'Gaming',noticia:'Gaming'}[tipo]||'Gaming';}
function formatFecha(iso){if(!iso)return'';try{return new Date(iso).toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'});}catch{return iso.slice(0,10);}}
function formatHora(iso){if(!iso)return'—';try{return new Date(iso).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});}catch{return'—';}}
function fmtNum(n){return n>=1000?(n/1000).toFixed(1)+'k':n.toString();}

cargarNoticias();
</script>
</body>
</html>
